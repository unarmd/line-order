<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Order</title>
  <style>
    :root{
      --bg:#fafafa;
      --card:#fff;
      --border:#e6e6e6;
      --text:#111;
      --muted:#666;
      --radius:14px;
    }
    *{ box-sizing:border-box; }
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      padding: 14px 14px 96px;
    }
    h2{ margin: 8px 2px 14px; font-size: 20px; }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: var(--radius);
      margin: 12px 0;
    }
    .muted{ color: var(--muted); font-size: 12px; margin-bottom: 10px; }

    .product{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }
    .product:first-child{ border-top: none; padding-top: 0; }

    .productLeft{
      display:flex;
      align-items:center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }

    .thumb{
      width: 72px;
      height: 72px;
      border-radius: 12px;
      object-fit: cover;
      background: #f0f0f0;
      border: 1px solid var(--border);
      flex: 0 0 auto;
      cursor: pointer;
    }

    .pname{
      min-width: 0;
      flex: 1;
    }
    .pname .title{
      font-size: 15px;
      font-weight: 650;
      line-height: 1.3;
      word-break: break-word;
      cursor: pointer;
    }
    .pname .price{
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .pname .desc{
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .qtyCtl{
      display:flex;
      align-items:center;
      gap: 8px;
      flex: 0 0 auto;
    }
    .qtyBtn{
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }
    .qtyNum{
      width: 34px;
      text-align:center;
      font-weight: 650;
      font-size: 16px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap: 6px;
      margin: 12px 0;
    }
    label{
      font-size: 12px;
      color: var(--muted);
    }
    input, select{
      width: 100%;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 16px;
      background: #fff;
    }

    .totalsRow{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
    }

    .stickyBar{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.98);
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      backdrop-filter: blur(8px);
    }
    .stickyTotal{
      min-width: 0;
      flex: 1;
    }
    .stickyTotal .lbl{
      font-size: 11px;
      color: var(--muted);
      line-height: 1.1;
    }
    .stickyTotal .val{
      font-size: 18px;
      font-weight: 850;
      line-height: 1.2;
      word-break: break-word;
    }
    .primaryBtn{
      flex: 0 0 auto;
      height: 46px;
      padding: 0 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      background: #111;
      color: #fff;
      cursor: pointer;
      min-width: 132px;
    }
    .primaryBtn:disabled{
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Modal */
    .modal{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      padding: 12px;
    }
    .modal.show{ display: flex; }
    .modalCard{
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }
    .modalImg{
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #f0f0f0;
      display: block;
    }
    .modalBody{
      padding: 16px;
    }
    .modalTitle{
      font-size: 20px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .modalPrice{
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .modalDesc{
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      white-space: pre-wrap;
      margin-bottom: 16px;
    }
    .modalActions{
      display:flex;
      justify-content:space-between;
      gap: 10px;
      align-items:center;
    }
    .secondaryBtn{
      height: 44px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    @media (min-width: 720px){
      body{ max-width: 780px; margin: 0 auto; padding: 18px 18px 96px; }
      h2{ font-size: 22px; }
      .primaryBtn{ min-width: 160px; }
      .modal{ align-items: center; }
    }
  </style>
</head>

<body>
  <h2>注文</h2>

  <div class="card">
    <div class="muted">商品一覧</div>
    <div id="products"></div>
  </div>

  <div class="card">
    <div class="muted">顧客情報</div>

    <div class="field">
      <label for="customer_name">姓名</label>
      <input id="customer_name" placeholder="山本 太郎" />
    </div>

    <div class="field">
      <label for="phone">電話番号</label>
      <input id="phone" placeholder="090..." inputmode="tel" />
    </div>

    <div class="field">
      <label for="delivery_method">配送方法</label>
      <select id="delivery_method">
        <option value="delivery">郵送</option>
      </select>
    </div>

    <div class="field">
      <label for="address">郵送先（ローマ字表示）</label>
      <input id="address" placeholder="ローマ字表示でのご住所" />
    </div>
  </div>

  <div class="card">
    <div class="muted">合計</div>
    <div class="totalsRow">
      <div>合計</div>
      <div id="preview">—</div>
    </div>
    <div id="breakdown" class="muted"></div>
  </div>

  <div id="msg" class="muted" style="margin-top:10px;"></div>

  <div class="stickyBar">
    <div class="stickyTotal">
      <div class="lbl">合計</div>
      <div class="val" id="stickyTotalVal">—</div>
    </div>
    <button class="primaryBtn" id="submitBtn">注文する</button>
  </div>

  <!-- Product detail modal -->
  <div id="productModal" class="modal" aria-hidden="true">
    <div class="modalCard">
      <img id="modalImg" class="modalImg" src="" alt="">
      <div class="modalBody">
        <div id="modalTitle" class="modalTitle"></div>
        <div id="modalPrice" class="modalPrice"></div>
        <div id="modalDesc" class="modalDesc"></div>
        <div class="modalActions">
          <button class="secondaryBtn" id="modalCloseBtn" type="button">閉じる</button>
          <button class="primaryBtn" id="modalAddBtn" type="button">カートに追加</button>
        </div>
      </div>
    </div>
  </div>

<script>
  /************* CONFIG *************/
  const API_BASE = "https://super-mouse-008b.unseatedcap070911311234.workers.dev";
  const APP_KEY  = "unseatedcap070911311234";

  let line_user_id = "";
  let products = [];
  let cart = {};
  let previewTimer = null;
  let currentModalProduct = null;

  function yen(n){ return "¥" + Number(n || 0).toLocaleString("ja-JP"); }

  async function apiGetProducts() {
    const url = `${API_BASE}?action=products&key=${encodeURIComponent(APP_KEY)}`;
    const res = await fetch(url);
    return await res.json();
  }

  async function apiPreview(cartArr) {
    const res = await fetch(API_BASE, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ key: APP_KEY, action: "preview", cart: cartArr })
    });
    return await res.json();
  }

  async function apiSubmit(cartArr, customer) {
    const res = await fetch(API_BASE, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        key: APP_KEY,
        action: "submit",
        cart: cartArr,
        customer,
        line_user_id
      })
    });
    return await res.json();
  }

  function runPreviewLocal() {
    const cartArr = cartAsArray();
    if (cartArr.length === 0) { setPreview(null); return; }

    const map = Object.fromEntries(products.map(p => [p.product_id, p]));
    let subtotal = 0;

    for (const item of cartArr) {
      const p = map[item.product_id];
      if (!p) continue;
      subtotal += Number(p.base_price) * Number(item.qty);
    }

    const total = subtotal;
    setPreview({ subtotal, total });
  }

  function cartAsArray() {
    const arr = [];
    for (const pid of Object.keys(cart)) {
      const qty = cart[pid];
      if (qty > 0) arr.push({ product_id: pid, qty });
    }
    return arr;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  function openProductModal(product) {
    currentModalProduct = product;
    document.getElementById("modalImg").src = product.image_url || "";
    document.getElementById("modalImg").alt = product.name || "";
    document.getElementById("modalTitle").textContent = product.name || "";
    document.getElementById("modalPrice").textContent = yen(product.base_price || 0);
    document.getElementById("modalDesc").textContent = product.description || "商品説明はありません。";
    document.getElementById("productModal").classList.add("show");
    document.getElementById("productModal").setAttribute("aria-hidden", "false");
  }

  function closeProductModal() {
    currentModalProduct = null;
    document.getElementById("productModal").classList.remove("show");
    document.getElementById("productModal").setAttribute("aria-hidden", "true");
  }

  function addOneToCart(productId) {
    cart[productId] = (cart[productId] || 0) + 1;
    renderProducts();
    schedulePreview();
  }

  function removeOneFromCart(productId) {
    cart[productId] = Math.max(0, (cart[productId] || 0) - 1);
    renderProducts();
    schedulePreview();
  }

  function renderProducts() {
    const el = document.getElementById("products");
    el.innerHTML = "";

    products.forEach(p => {
      const row = document.createElement("div");
      row.className = "product";

      const left = document.createElement("div");
      left.className = "productLeft";

      const img = document.createElement("img");
      img.className = "thumb";
      img.src = p.image_url || "";
      img.alt = p.name || "";
      img.onclick = () => openProductModal(p);

      const name = document.createElement("div");
      name.className = "pname";

      const title = document.createElement("div");
      title.className = "title";
      title.textContent = p.name;
      title.onclick = () => openProductModal(p);

      const price = document.createElement("div");
      price.className = "price";
      price.textContent = yen(p.base_price);

      const desc = document.createElement("div");
      desc.className = "desc";
      desc.textContent = p.description || "";

      name.appendChild(title);
      name.appendChild(price);
      if (p.description) name.appendChild(desc);

      left.appendChild(img);
      left.appendChild(name);

      const ctl = document.createElement("div");
      ctl.className = "qtyCtl";

      const minus = document.createElement("button");
      minus.className = "qtyBtn";
      minus.type = "button";
      minus.textContent = "−";
      minus.onclick = () => removeOneFromCart(p.product_id);

      const qty = document.createElement("div");
      qty.className = "qtyNum";
      qty.textContent = cart[p.product_id] || 0;

      const plus = document.createElement("button");
      plus.className = "qtyBtn";
      plus.type = "button";
      plus.textContent = "+";
      plus.onclick = () => addOneToCart(p.product_id);

      ctl.appendChild(minus);
      ctl.appendChild(qty);
      ctl.appendChild(plus);

      row.appendChild(left);
      row.appendChild(ctl);
      el.appendChild(row);
    });
  }

  function setPreview(totals) {
    const p = document.getElementById("preview");
    const sticky = document.getElementById("stickyTotalVal");
    const b = document.getElementById("breakdown");

    if (!totals) {
      p.textContent = "—";
      sticky.textContent = "—";
      b.textContent = "";
      return;
    }

    p.textContent = yen(totals.total);
    sticky.textContent = yen(totals.total);
    b.textContent = `小計 ${yen(totals.subtotal)}`;
  }

  function schedulePreview() {
    runPreviewLocal();
  }

  async function runPreview() {
    const cartArr = cartAsArray();
    if (cartArr.length === 0) { setPreview(null); return; }

    const res = await apiPreview(cartArr);
    if (!res.ok) {
      document.getElementById("msg").textContent = "Preview error: " + res.error;
      setPreview(null);
      return;
    }
    setPreview(res.totals);
    document.getElementById("msg").textContent = "";
  }

  async function init() {
    const res = await apiGetProducts();
    if (!res.ok) {
      document.getElementById("msg").textContent = "Products error: " + res.error;
      return;
    }
    products = res.products;
    renderProducts();
    runPreviewLocal();
  }

  document.getElementById("modalCloseBtn").onclick = closeProductModal;
  document.getElementById("productModal").onclick = (e) => {
    if (e.target.id === "productModal") closeProductModal();
  };
  document.getElementById("modalAddBtn").onclick = () => {
    if (!currentModalProduct) return;
    addOneToCart(currentModalProduct.product_id);
    closeProductModal();
  };

  document.getElementById("submitBtn").onclick = async () => {
    const btn = document.getElementById("submitBtn");

    const cartArr = cartAsArray();
    if (cartArr.length === 0) {
      alert("Cart is empty");
      return;
    }

    const customer = {
      customer_name: document.getElementById("customer_name").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      delivery_method: document.getElementById("delivery_method").value,
      address: document.getElementById("address").value.trim()
    };

    if (!customer.customer_name) { alert("姓名を入力してください"); return; }
    if (!customer.phone) { alert("電話番号を入力してください"); return; }
    if (customer.delivery_method === "delivery" && !customer.address) {
      alert("郵送先を入力してください");
      return;
    }

    btn.disabled = true;
    btn.textContent = "処理中...";

    try {
      const res = await apiSubmit(cartArr, customer);

      if (!res.ok) {
        alert("Submit error: " + res.error);
        return;
      }

      alert(`注文完了！\n注文ID: ${res.order_id}\n合計: ${yen(res.totals.total)}`);

      cart = {};
      renderProducts();
      setPreview(null);

    } catch (err) {
      alert("Network error. Please try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "注文する";
    }
  };

  init();
</script>
</body>
</html>
