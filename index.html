<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Order</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 16px; }
    .row { display:flex; gap:12px; align-items:center; margin: 10px 0; }
    .name { flex: 1; }
    button { padding: 6px 10px; }
    input { padding: 8px; width: 100%; max-width: 300px;}
    .card { border: 1px solid #ddd; padding: 12px; border-radius: 10px; margin: 10px 0; }
    .totals { font-size: 18px; font-weight: 600; }
    .muted { color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <h2>Order</h2>

  <div class="card">
    <div class="muted">Products</div>
    <div id="products"></div>
  </div>

  <div class="card">
    <div class="muted">Customer</div>
    <div class="row"><div class="name">姓名</div><input id="customer_name" placeholder="山本 太郎"></div>
    <div class="row"><div class="name">電話番号</div><input id="phone" placeholder="090..."></div>
    <div class="row">
      <div class="name">配送方法</div>
      <select id="delivery_method">
        <!-- <option value="pickup">Pickup</option> -->
        <option value="delivery">郵送</option>
      </select>
    </div>
    <div class="row"><div class="name">郵送先</div><input id="address" placeholder="東京都…"></div>
  </div>

  <div class="card">
    <div class="muted">合計；</div>
    <div id="preview" class="totals">—</div>
    <div id="breakdown" class="muted"></div>
  </div>

  <button id="submitBtn">Place order</button>
  <div id="msg" class="muted" style="margin-top:10px;"></div>

<script>
  /************* CONFIG *************/
  const API_BASE = "https://super-mouse-008b.unseatedcap070911311234.workers.dev"; // .../exec
  const APP_KEY  = "unseatedcap070911311234";        // must match Code.gs

  // If you add LIFF later, set this from liff.getProfile().userId
  let line_user_id = "";

  let products = [];
  let cart = {}; // { product_id: qty }
  let previewTimer = null;

  function yen(n){ return "¥" + Number(n || 0).toLocaleString("ja-JP"); }

  async function apiGetProducts() {
    const url = `${API_BASE}?action=products&key=${encodeURIComponent(APP_KEY)}`;
    const res = await fetch(url);
    return await res.json();
  }

  async function apiPreview(cartArr) {
    const res = await fetch(API_BASE, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ key: APP_KEY, action: "preview", cart: cartArr })
    });
    return await res.json();
  }
  
  async function apiSubmit(cartArr, customer) {
    const res = await fetch(API_BASE, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        key: APP_KEY,
        action: "submit",
        cart: cartArr,
        customer,
        line_user_id
      })
    });
    return await res.json();
  }

  function runPreviewLocal() {
    const cartArr = cartAsArray();
    if (cartArr.length === 0) { setPreview(null); return; }
  
    const map = Object.fromEntries(products.map(p => [p.product_id, p]));
  
    let subtotal = 0;
    for (const item of cartArr) {
      const p = map[item.product_id];
      if (!p) continue;
      subtotal += Number(p.base_price) * Number(item.qty);
    }
  
    // match your backend rule
    const shipping = subtotal >= 3000 ? 0 : 200;
    const discount = 0;
    const tax = 0;
    const total = subtotal + shipping - discount + tax;
  
    setPreview({ subtotal, shipping, discount, tax, total });
  }
  
  function cartAsArray() {
    const arr = [];
    for (const pid of Object.keys(cart)) {
      const qty = cart[pid];
      if (qty > 0) arr.push({ product_id: pid, qty });
    }
    return arr;
  }

  function renderProducts() {
    const el = document.getElementById("products");
    el.innerHTML = "";

    products.forEach(p => {
      const row = document.createElement("div");
      row.className = "row";

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = `${p.name} (${yen(p.base_price)})`;

      const minus = document.createElement("button");
      minus.textContent = "−";
      minus.onclick = () => {
        cart[p.product_id] = Math.max(0, (cart[p.product_id] || 0) - 1);
        qty.textContent = cart[p.product_id] || 0;
        schedulePreview();
      };

      const qty = document.createElement("div");
      qty.style.width = "24px";
      qty.style.textAlign = "center";
      qty.textContent = cart[p.product_id] || 0;

      const plus = document.createElement("button");
      plus.textContent = "+";
      plus.onclick = () => {
        cart[p.product_id] = (cart[p.product_id] || 0) + 1;
        qty.textContent = cart[p.product_id];
        schedulePreview();
      };

      row.appendChild(name);
      row.appendChild(minus);
      row.appendChild(qty);
      row.appendChild(plus);
      el.appendChild(row);
    });
  }

  function setPreview(totals) {
    const p = document.getElementById("preview");
    const b = document.getElementById("breakdown");
    if (!totals) {
      p.textContent = "—";
      b.textContent = "";
      return;
    }
    p.textContent = `Total: ${yen(totals.total)}`;
    b.textContent = `Subtotal ${yen(totals.subtotal)} · Shipping ${yen(totals.shipping)} · Discount ${yen(totals.discount)} · Tax ${yen(totals.tax)}`;
  }
  
  function schedulePreview() {
    // no network; instant
    runPreviewLocal();
  }

  async function runPreview() {
    const cartArr = cartAsArray();
    if (cartArr.length === 0) { setPreview(null); return; }

    const res = await apiPreview(cartArr);
    if (!res.ok) {
      document.getElementById("msg").textContent = "Preview error: " + res.error;
      setPreview(null);
      return;
    }
    setPreview(res.totals);
    document.getElementById("msg").textContent = "";
  }

  async function init() {
    // Load products
    const res = await apiGetProducts();
    if (!res.ok) {
      document.getElementById("msg").textContent = "Products error: " + res.error;
      return;
    }
    products = res.products;
    renderProducts();
  }

  document.getElementById("submitBtn").onclick = async () => {
    const cartArr = cartAsArray();
    if (cartArr.length === 0) { alert("Cart is empty"); return; }

    const customer = {
      customer_name: document.getElementById("customer_name").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      delivery_method: document.getElementById("delivery_method").value,
      address: document.getElementById("address").value.trim()
    };

    const res = await apiSubmit(cartArr, customer);
    if (!res.ok) {
      alert("Submit error: " + res.error);
      return;
    }
    alert(`Order placed!\nOrder ID: ${res.order_id}\nTotal: ${yen(res.totals.total)}`);

    // reset
    cart = {};
    renderProducts();
    setPreview(null);
  };

  function doGet(e) {
  // Existing products endpoint support:
  // ?action=products&key=APP_KEY

  // Admin UI:
  if (e.parameter && e.parameter.page === "admin") {
    return HtmlService.createHtmlOutputFromFile("admin");
  }

  // Keep your existing GET behavior (products)
  if (!requireKey_(e)) return jsonResponse({ ok: false, error: "Unauthorized" }, 401);

  const action = (e.parameter.action || "").toLowerCase();
  try {
    if (action === "products") return jsonResponse({ ok: true, products: getProducts_() });
    return jsonResponse({ ok: false, error: "Unknown action" }, 400);
  } catch (err) {
    return jsonResponse({ ok: false, error: String(err) }, 500);
  }
}

// ===== Admin API (called from the admin page) =====

// OPTIONAL: simple allowlist by email
const STAFF_EMAILS = [
  "staff1@example.com",
  "staff2@example.com",
];

function assertStaff_() {
  const email = Session.getActiveUser().getEmail(); // works best in Google Workspace domains
  if (STAFF_EMAILS.length && !STAFF_EMAILS.includes(email)) {
    throw new Error("Not authorized: " + email);
  }
}

// returns recent orders
function adminGetOrders(limit = 100) {
  assertStaff_();

  const sh = getSheet_(ORDERS_TAB);
  const values = sh.getDataRange().getValues();
  const headers = values[0];
  const rows = values.slice(1);

  const idx = {};
  headers.forEach((h, i) => idx[h] = i);

  // Most recent first
  rows.reverse();

  const out = rows.slice(0, limit).map((r, i) => ({
    rowNumber: values.length - i, // approximate; used for updates (see below)
    timestamp: r[idx["timestamp"]],
    order_id: r[idx["order_id"]],
    customer_name: r[idx["customer_name"]],
    phone: r[idx["phone"]],
    delivery_method: r[idx["delivery_method"]],
    address: r[idx["address"]],
    total: r[idx["total"]],
    status: r[idx["status"]],
    items_json: r[idx["items_json"]],
  }));

  return { ok: true, orders: out };
}

// update status by order_id
function adminUpdateStatus(order_id, newStatus) {
  assertStaff_();

  const sh = getSheet_(ORDERS_TAB);
  const values = sh.getDataRange().getValues();
  const headers = values[0];

  const idx = {};
  headers.forEach((h, i) => idx[h] = i);

  const statusCol = idx["status"] + 1; // 1-based
  const orderIdCol = idx["order_id"];

  for (let r = 1; r < values.length; r++) {
    if (String(values[r][orderIdCol]) === String(order_id)) {
      sh.getRange(r + 1, statusCol).setValue(newStatus);
      return { ok: true };
    }
  }
  return { ok: false, error: "order_id not found" };
}

  init();
</script>
</body>
</html>
